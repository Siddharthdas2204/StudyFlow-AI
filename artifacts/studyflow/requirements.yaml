packages:
  "framer-motion": "For fluid page transitions, layout animations, and the flip card UI"
  "react-markdown": "For rendering AI responses and notes content beautifully"
  "remark-gfm": "For Github flavored markdown support in react-markdown"
  "recharts": "For the study progress tracking dashboard visualizations"
  "date-fns": "For easy date manipulation and formatting for the study planner and review schedules"
  "canvas-confetti": "For celebratory effects when completing quizzes or study sessions"
  "lucide-react": "Standard icon set"

images:
  - path: "artifacts/studyflow/public/images/dashboard-bg.png"
    description: "Abstract dark premium mesh gradient with deep indigo and purple hues, subtle glowing orbs, futuristic productivity aesthetic"
    aspect_ratio: "16:9"
  - path: "artifacts/studyflow/public/images/empty-notes.png"
    description: "Minimalist 3D isometric illustration of a floating notebook and glowing pen on a dark background, purple lighting"
    aspect_ratio: "1:1"
  - path: "artifacts/studyflow/public/images/empty-flashcards.png"
    description: "Minimalist 3D isometric illustration of floating index cards overlapping, glowing edges, dark theme with violet accents"
    aspect_ratio: "1:1"

notes:
  - Using generated API hooks from @workspace/api-client-react
  - Simulating complex AI workflows by chaining generic API requests
  - Export functions are handled client-side (Blob generation)
